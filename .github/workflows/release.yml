name: Release Rust Program

on:
  push:
    tags:
      - 'v*'

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
  release:
    runs-on: ubuntu-latest
    needs: create_release
    strategy:
      matrix:
        target: [x86_64-unknown-linux-musl,x86_64-pc-windows-gnu] 

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      
      - name: Update target 
        run : | 
          sudo apt-get install mingw-w64
          rustup target add ${{ matrix.target }}    

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/relay_board_rs_485* staging/
          tar -czvf target/release/relay_board_rs_485-${{ matrix.target }}.tar.gz -C staging .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create_release.outputs.tag-name }}
          files: target/release/relay_board_rs_485-${{ matrix.target }}.tar.gz